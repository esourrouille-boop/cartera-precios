name: Actualizar precios CEDEARs

on:
  schedule:
    - cron: '0 13,14,15,16,17,18,19,20 * * 1-5'  # cada hora de 10:00 a 17:00 ARG (lun-vie)
  workflow_dispatch:  # permite correrlo manualmente

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Correr scraper
        run: python scraper.py

      - name: Guardar precios.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add precios.json
          git diff --staged --quiet || git commit -m "Actualizar precios $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
